version: '3.8'
services:
  client:
    image: logxapp/logx-frontend:ci
    container_name: logx-frontend
    restart: unless-stopped 
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?Set VITE_API_BASE_URL in client/.env}
    ports:
      - "3000:5173"
    env_file:
      - .env
