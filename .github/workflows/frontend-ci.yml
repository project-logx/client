name: Frontend CI

on:
  push:
    branches: [main, master]
    paths:
      - src/**
      - .github/workflows/frontend-ci.yml
      - package-lock.json
      - package.json
      - Dockerfile
  pull_request:
    branches: [main, master]
    paths:
      - src/**
      - .github/workflows/frontend-ci.yml
      - package-lock.json
      - package.json
      - Dockerfile
  workflow_dispatch:

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    # defaults:
    #   run:
    #     working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        env:
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run build

  docker:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build --build-arg VITE_API_BASE_URL=http://localhost:8000 -t ${{secrets.DOCKER_USERNAME}}/logx-frontend:ci ./client

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Push frontend image
        run: docker push ${{secrets.DOCKER_USERNAME}}/logx-frontend:ci
