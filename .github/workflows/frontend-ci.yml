name: Frontend CI

on:
  push:
    branches: [main, master]
    paths:
      - "client/**"
      - ".github/workflows/frontend-ci.yml"
      - "docker-compose.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "client/**"
      - ".github/workflows/frontend-ci.yml"
      - "docker-compose.yml"

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        env:
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run build

  docker:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build --build-arg VITE_API_BASE_URL=http://localhost:8000 -t logx-frontend:ci ./client
